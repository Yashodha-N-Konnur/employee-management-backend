# ============================================================
# Employee Management System - Application Configuration
# ============================================================

# Server
server.port=8080
server.servlet.context-path=/
spring.main.allow-circular-references=true
# ============================================================
# DATASOURCE - MySQL
# ============================================================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=EmployeeMgmtPool
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# SPRING DATA - Pagination
# ============================================================
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGVtcGxveWVlIG1hbmFnZW1lbnQgc3lzdGVtIGp3dCBhdXRoZW50aWNhdGlvbg==
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000
app.jwt.issuer=employee-management-system

# ============================================================
# SPRING SECURITY - In-memory users (override with DB in prod)
# ============================================================
app.security.admin.username=admin
app.security.admin.password=admin123
app.security.user.username=user
app.security.user.password=user123

# ============================================================
# SWAGGER / OPENAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=false

# ============================================================
# LOGGING
# ============================================================
logging.level.com.example.employeemanagement=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/employee-management.log

# ============================================================
# APPLICATION INFO
# ============================================================
app.name=Employee Management System
app.version=1.0.0
app.description=RESTful API for managing employees, departments, and roles
